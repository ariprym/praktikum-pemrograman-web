<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pembayaran</title>
    <script>
        function process() {
            var age = document.getElementById("age_input").value;
            var subtotal = document.getElementById("subtotal").value;
            var result = document.getElementById("result");

            if (isNaN(age) || isNaN(subtotal)) {
                alert("Input harus berupa angka!");
                result.innerHTML = "";
                return;
            }

            if (age === "" || subtotal === "") {
                result.innerHTML = "";
                return;
            }

            age = Number(age);
            subtotal = Number(subtotal);

            var diskon;
            var status = "";

            if (age < 18) {
                status = "Kamu adalah bocil";
                diskon = 0.5;
                result.style.color = "green";
            } else {
                status = "Kamu dewasa";
                diskon = 0.2;
                result.style.color = "red";
            }

            var total = subtotal - (subtotal * diskon);

            result.innerHTML =
                status + "<br>Total setelah diskon: Rp " + total;
        }
    </script>
</head>
<body>

    <h2>Sistem Pembayaran</h2>

    Umur:
    <input 
        type="text" 
        id="age_input" 
        onchange="process()"
    >

    <br><br>

    Subtotal:
    <input 
        type="text" 
        id="subtotal" 
        onchange="process()"
    >

    <br><br>

    <p id="result" style="font-weight: bold;"></p>

</body>
</html>
