<!DOCTYPE html>
<html>
<head>
    <title>Verifikasi Umur</title>
    <script>
        function check_age() {
            var age = document.getElementById("age_input").value;
            var result = document.getElementById("result");

            if (age === "" || isNaN(age)) {
                result.innerHTML = "Masukkan angka yang valid!";
                result.style.color = "orange";
                return;
            }

            if (age < 18) {
                result.innerHTML = "Kamu adalah bocil";
                result.style.color = "red";
            } else {
                result.innerHTML = ""; 
            }
        }
    </script>
</head>
<body>

    <h2>Verifikasi Umur</h2>

    <input 
        type="number" 
        id="age_input" 
        placeholder="Masukkan umur"
        oninput="check_age()"
    >

    <br><br>

    <p id="result" style="font-weight: bold;"></p>

</body>
</html>
