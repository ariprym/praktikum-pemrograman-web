<!DOCTYPE html>
<html>
<head>
    <title>Kalkulator Listrik Kos</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #form2 { margin-top: 10px; }
        #hasil { margin-top: 10px; line-height: 1.6; font-weight: bold; }
        input { padding: 6px; width: 200px; }
    </style>

    <script>
        function showForm() {
            var id = document.getElementById("id_pel").value;
            var form2 = document.getElementById("form2");
            var hasil = document.getElementById("hasil");

            if (id !== "" && isNaN(id)) {
                alert("ID harus berupa angka!");
                document.getElementById("id_pel").value = "";
                form2.style.display = "none";
                hasil.innerHTML = "";
                return;
            }

            if (id !== "") {
                form2.style.display = "block";
            } else {
                form2.style.display = "none";
                hasil.innerHTML = "";
            }
        }

        function hitung() {
            var k1 = document.getElementById("kamar1").value;
            var k2 = document.getElementById("kamar2").value;
            var k3 = document.getElementById("kamar3").value;
            var hasil = document.getElementById("hasil");

            if (k1 === "" || k2 === "" || k3 === "" ||
                isNaN(k1) || isNaN(k2) || isNaN(k3) ||
                k1 < 0 || k2 < 0 || k3 < 0) {

                hasil.innerHTML = "Masukkan angka yang valid!";
                hasil.style.color = "orange";
                return;
            }

            k1 = Number(k1);
            k2 = Number(k2);
            k3 = Number(k3);

            var total = k1 + k2 + k3;
            var pajak = total * 0.11;
            var akhir = total + pajak;

            hasil.style.color = "black";
            hasil.innerHTML =
                "<strong>Total:</strong> Rp " + total.toLocaleString() + "<br>" +
                "<strong>Pajak 11%:</strong> Rp " + pajak.toLocaleString() + "<br>" +
                "<strong>Total Bayar:</strong> Rp " + akhir.toLocaleString();
        }
    </script>
</head>
<body>

    <h2>Form Pencatatan Listrik Kos</h2>

    ID Pelanggan:
    <input type="text" id="id_pel" oninput="showForm()">

    <br><br>

    <div id="form2" style="display:none;">
        <h3>Input Pemakaian</h3>

        Kamar 1:
        <input type="text" id="kamar1" oninput="hitung()"><br><br>

        Kamar 2:
        <input type="text" id="kamar2" oninput="hitung()"><br><br>

        Kamar 3:
        <input type="text" id="kamar3" oninput="hitung()"><br><br>

        <p id="hasil"></p>
    </div>

</body>
</html>
